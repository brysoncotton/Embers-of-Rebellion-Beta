name: Sync Beta to Dev
on:
  issues:
    types: [opened] # Removed 'labeled' to prevent double-firing

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue in Dev Repo
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: "Originally reported in Beta by ${{ github.event.issue.user.login }}:\n\n${{ github.event.issue.body }}"
          # This grabs just the names of the labels as a JSON array
          LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          # Use jq to safely escape the title and body for the JSON payload
          JSON_PAYLOAD=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg body "$ISSUE_BODY" \
            --argjson labels "$LABELS" \
            '{title: $title, body: $body, labels: $labels}')

          curl -X POST \
            -H "Authorization: token $SYNC_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/brysoncotton/Embers-of-Rebellion-Developer/issues \
            -d "$JSON_PAYLOAD"
