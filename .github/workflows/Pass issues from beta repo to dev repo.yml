- name: Create issue with labels
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.user.login }} reported: ${{ github.event.issue.body }}
          # Extract labels into a JSON array format
          LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/brysoncotton/Embers-of-Rebellion-Developer/issues \
            --data-binary @- <<EOF
          {
            "title": $(echo "$ISSUE_TITLE" | jq -R .),
            "body": $(echo "$ISSUE_BODY" | jq -R .),
            "labels": $LABELS
          }
          EOF
