name: Sync Issues with Labels
on:
  issues:
    types: [opened, labeled]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue with labels
        run: |
          # Extract labels into a JSON array format
          LABELS=$(echo '${{ toJson(github.event.issue.labels) }}' | jq -c '[.[].name]')

          curl -X POST \
            -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/brysoncotton/Embers-of-Rebellion-Beta/issues \
            -d "{\"title\":\"${{ github.event.issue.title }}\",\"body\":\"Originally reported by ${{ github.event.issue.user.login }}:\n\n${{ github.event.issue.body }}\",\"labels\":$LABELS}"
